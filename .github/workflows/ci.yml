# Coldfire fork CI gate.
#
# One macOS job (Apple Silicon) — the runtime closure contains
# `mlx-metal`, which is wheel-only for arm64-darwin and has NO Linux
# distribution. Running lint/test/license-check on Ubuntu would fail at
# `pip install -r requirements.lock` because `mlx-metal==X.Y.Z` resolves
# to zero matching versions on Linux. The Ubuntu `lint-and-test` job
# that used to live here is commented out at the bottom for posterity;
# if we ever ship a portable build it can come back. For now, single
# macOS job covering:
#   - make lint           (ruff check + ruff format --check + mypy)
#   - make test           (282 unit tests)
#   - make license-check  (76 runtime packages must all be permissive)
#   - make test-smoke     (10 Apple-Silicon integration smokes)

name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  apple-silicon:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Cache HuggingFace model downloads so smoke runs don't re-fetch
      # the ~250MB tinyllama and ~150MB nomic-embed-v1.5 every push.
      # Key includes the model IDs we expect to pull so a config change
      # forces a fresh cache.
      - name: Cache HuggingFace models
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-llama32-1b-4bit-nomic-v15
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Create venv and install (runtime + dev)
        run: |
          python -m venv .venv
          # ``pip install --group`` (PEP 735 dependency-groups) requires
          # pip >= 25.1. Pin explicitly so a future runner image that
          # ships an older pip doesn't break this step silently.
          .venv/bin/pip install --upgrade 'pip>=25.1'
          .venv/bin/pip install -r requirements.lock
          # Dev deps (pytest, ruff, mypy, pip-licenses, ...) live in PEP
          # 735 [dependency-groups].dev in pyproject.toml — invisible to
          # pip-compile / requirements.lock. Install them explicitly so
          # `make lint`, `make test`, and `make license-check` work.
          .venv/bin/pip install --group dev
          # Editable install so mypy can resolve the package.
          .venv/bin/pip install -e . --no-deps

      - name: make lint
        run: make lint

      - name: make test
        run: make test

      - name: make license-check
        run: make license-check

      - name: make test-smoke
        run: make test-smoke

# --- Disabled: Ubuntu lint-and-test --------------------------------------
# Cannot run on Ubuntu — the runtime closure contains `mlx-metal`, an
# Apple-Silicon-only wheel with zero Linux distributions. Any attempt to
# `pip install -r requirements.lock` on Ubuntu fails with:
#
#     ERROR: Could not find a version that satisfies the requirement
#            mlx-metal==X.Y.Z (from versions: none)
#
# Without the venv installed, `make lint` (mypy needs to import app/
# which transitively imports mlx) and `make test` (unit tests load
# embedding model fixtures) both fail. `make license-check` walks the
# installed venv via importlib.metadata, also unavailable without it.
