# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # tests/fixtures/ contents are auto-generated by
        # scripts/generate_tiny_*_fixture.py and round-trip through
        # safetensors/transformers serializers — re-running the
        # generator would re-introduce any whitespace the hook strips,
        # so they're excluded for stability.
        exclude: '.*\.md$|^tests/fixtures/.*'
      - id: end-of-file-fixer
        exclude: '.*\.md$|^tests/fixtures/.*'
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-ast
      - id: check-merge-conflict

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.9
    hooks:
      - id: actionlint

  # Note: shellcheck cannot directly parse YAML; actionlint extracts workflow
  # shell blocks and calls shellcheck when available.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # Match by detected shell file type (extensions or shebang)
        types: [shell]
        # ``-x`` follows sourced files (e.g. _common.sh in scripts/verify/).
        # ``--exclude=SC1091`` silences "Not following: <file>" info
        # warnings when shellcheck's CWD is the repo root but the
        # ``# shellcheck source=`` directives use script-relative paths.
        # The actual sourcing works at runtime; SC1091 is info-only.
        args: ['-x', '--exclude=SC1091']

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

ci:
  autofix_prs: true
  autoupdate_schedule: weekly
  skip: []
  submodules: false
